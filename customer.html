const CATEGORIES=['全部','纖體系列','保健系列','美肌系列','護髮系列'];
let currentCat='全部';
let searchQuery='';

// ===== INIT =====
async function init(){
  renderCatRow();
  renderProducts();
  loadAnnouncement();
}

async function loadAnnouncement(){
  try{
    const{data}=await sb.from('announcements').select('*').eq('is_active',true).order('created_at',{ascending:false}).limit(1);
    if(data&&data.length&&data[0].content){
      document.getElementById('announceText').textContent=data[0].content;
      document.getElementById('announceBanner').style.display='block';
    }
  }catch(e){}
}

function closeBanner(){document.getElementById('announceBanner').style.display='none';}

function renderCatRow(){
  const el=document.getElementById('catRow');
  el.innerHTML=CATEGORIES.map(c=>`<button class="cat-btn${c===currentCat?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');
}

function setCat(cat){
  currentCat=cat;
  renderCatRow();
  renderProducts();
}

function doSearch(){
  const val=document.getElementById('searchInput').value;
  searchQuery=val.toLowerCase();
  document.getElementById('clearBtn').style.display=val?'block':'none';
  renderProducts();
}

function clearSearch(){
  document.getElementById('searchInput').value='';
  searchQuery='';
  document.getElementById('clearBtn').style.display='none';
  renderProducts();
}

function matchesSearch(p){
  if(!searchQuery)return true;
  const fields=[p.name,p.tagline,p.cat,...p.effects,p.dosage,p.howto,p.tips,...p.qa.map(q=>q.q+' '+q.a)].join(' ').toLowerCase();
  return fields.includes(searchQuery);
}

function renderProducts(){
  let list=PRODUCTS;
  if(currentCat!=='全部') list=list.filter(p=>p.cat===currentCat);
  if(searchQuery) list=list.filter(matchesSearch);
  const el=document.getElementById('prodList');
  if(!list.length){el.innerHTML=`<div class="no-results"><div class="icon">🔍</div><div>找不到「${searchQuery||currentCat}」相關產品</div><div style="font-size:12px;margin-top:6px;">試試其他關鍵字</div></div>`;return;}
  el.innerHTML=list.map(p=>renderProdCard(p)).join('');
}

function renderProdCard(p){
  const effectChips=p.effects.map(e=>`<span class="effect-chip">${e}</span>`).join('');
  const qaRows=p.qa.map(q=>`<div style="background:#fafafa;border-radius:8px;padding:10px 12px;margin-bottom:6px;"><div style="font-size:13px;font-weight:600;color:#333;margin-bottom:4px;">Q：${q.q}</div><div style="font-size:13px;color:#666;line-height:1.6;">A：${q.a}</div></div>`).join('');

  const dosageLines=p.dosage.split('\n').map(l=>`<div>${l}</div>`).join('');
  const howtoLines=p.howto.split('\n').map(l=>`<div>${l}</div>`).join('');
  const tipLines=p.tips.split('\n').map(l=>`<div>${l}</div>`).join('');

  return `<div class="prod-card" id="card-${p.id}">
    <div class="prod-card-header" onclick="toggleCard(${p.id})">
      <div class="prod-icon-wrap" style="background:${p.color};">${p.icon}</div>
      <div style="flex:1;min-width:0;">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:3px;flex-wrap:wrap;">
          <div class="prod-name">${p.name}</div>
          <span class="prod-cat-tag" style="background:${p.catBg};color:${p.catColor};">${p.cat}</span>
        </div>
        <div class="prod-tagline">${p.tagline}</div>
      </div>
      <div style="font-size:18px;color:#ddd;transition:transform 0.3s;" id="arrow-${p.id}">›</div>
    </div>
    <div class="prod-preview-tags">${effectChips}</div>
    <div class="prod-detail" id="detail-${p.id}">
      <div class="detail-section">
        <div class="detail-label">📏 建議用量</div>
        <div class="dosage-badge">一天用量</div>
        <div class="detail-content highlight">${dosageLines}</div>
        ${p.timing?`<div style="font-size:12px;color:#5BBDB7;margin-top:6px;">⏰ ${p.timing}</div>`:''}
      </div>
      ${p.howto?`<div class="detail-section"><div class="detail-label">🫧 使用方式</div><div class="how-to-card"><div class="detail-content">${howtoLines}</div></div></div>`:''}
      ${p.tips?`<div class="detail-section"><div class="detail-label">💛 小提醒 & 延伸吃法</div><div class="tip-card"><div class="detail-content">${tipLines}</div></div></div>`:''}
      ${qaRows?`<div class="detail-section"><div class="detail-label">❓ 常見問題</div>${qaRows}</div>`:''}
      <div class="disclaimer">具體用量因人而異，請諮詢您的專屬賣家取得最適合您的方案</div>
    </div>
  </div>`;
}

let openCards=new Set();
function toggleCard(id){
  const detail=document.getElementById('detail-'+id);
  const arrow=document.getElementById('arrow-'+id);
  if(openCards.has(id)){
    detail.classList.remove('open');
    arrow.style.transform='rotate(0deg)';
    openCards.delete(id);
  } else {
    detail.classList.add('open');
    arrow.style.transform='rotate(90deg)';
    openCards.add(id);
  }
}

init();
</script>
