<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="HT 小錦囊">
<link rel="apple-touch-icon" href="app3.jpg">
<title>HT 客人小錦囊</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f0e8;min-height:100vh;}

/* LOGIN */
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:url('HT2.jpg') center/cover no-repeat;}
.login-brand{text-align:center;margin-bottom:1.5rem;}
.login-brand h1{font-size:22px;font-weight:600;color:white;letter-spacing:2px;margin-bottom:4px;}
.login-brand h2{font-size:16px;color:rgba(255,255,255,0.85);}
.login-tagline{font-size:13px;color:rgba(255,255,255,0.7);text-align:center;margin-bottom:2rem;letter-spacing:2px;}
.login-card{background:rgba(255,255,255,0.95);border-radius:18px;padding:2rem;width:100%;max-width:360px;box-shadow:0 8px 32px rgba(0,0,0,0.2);}
.login-tabs{display:flex;gap:0;margin-bottom:1.5rem;background:#f5f0e8;border-radius:10px;padding:3px;}
.login-tab{flex:1;padding:8px;text-align:center;font-size:13px;color:#888;cursor:pointer;border-radius:8px;border:none;background:transparent;}
.login-tab.active{background:white;color:#8B7355;font-weight:600;box-shadow:0 1px 4px rgba(0,0,0,0.1);}
.login-card input{width:100%;padding:12px 14px;border:1px solid #d4c4b0;border-radius:10px;font-size:14px;margin-bottom:10px;outline:none;background:white;}
.login-card input:focus{border-color:#A67C5B;}
.login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#8B7355,#A67C5B);color:white;font-size:15px;font-weight:600;cursor:pointer;}
.login-msg{font-size:13px;color:#E24B4A;text-align:center;margin-top:10px;min-height:20px;}

/* MAIN */
#mainPage{display:none;padding-bottom:80px;}
.app-header{background:linear-gradient(135deg,#8B7355,#A67C5B);padding:1.25rem;color:white;}
.header-brand{font-size:11px;opacity:0.7;letter-spacing:2px;margin-bottom:2px;}
.header-title{font-size:22px;font-weight:700;}
.header-sub{font-size:12px;opacity:0.7;margin-top:2px;}

/* NAV */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #e8dcc8;display:flex;z-index:100;}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;border:none;background:none;}
.nav-icon{font-size:19px;display:block;margin-bottom:2px;}
.nav-label{font-size:10px;color:#aaa;}
.nav-item.active .nav-label{color:#8B7355;font-weight:600;}

/* PAGES */
.page{display:none;padding:1rem;}
.page.active{display:block;}

/* SEARCH + FILTER */
.search-box{display:flex;align-items:center;gap:10px;background:white;border-radius:12px;padding:10px 14px;margin-bottom:10px;box-shadow:0 2px 8px rgba(0,0,0,0.05);}
.search-box input{flex:1;border:none;outline:none;font-size:14px;color:#333;background:transparent;}
.cat-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:1rem;scrollbar-width:none;}
.cat-scroll::-webkit-scrollbar{display:none;}
.cat-btn{padding:7px 16px;border-radius:20px;border:1.5px solid #d4c4b0;background:white;font-size:12px;color:#8B7355;cursor:pointer;white-space:nowrap;flex-shrink:0;font-weight:500;}
.cat-btn.active{background:#8B7355;border-color:#8B7355;color:white;}

/* CARDS */
.info-card{background:white;border-radius:14px;padding:1.2rem;margin-bottom:12px;box-shadow:0 2px 10px rgba(139,115,85,0.08);}
.info-title{font-size:15px;font-weight:700;color:#3d2f24;margin-bottom:6px;}
.cat-tag{font-size:11px;padding:3px 10px;border-radius:8px;background:#e8dcc8;color:#5a4a3a;font-weight:600;display:inline-block;margin-bottom:10px;}
.info-label{font-size:11px;font-weight:700;color:#999;letter-spacing:1px;margin-bottom:4px;}
.info-content{font-size:13px;color:#5a4a3a;line-height:1.7;}
.qa-card{background:white;border-radius:14px;padding:1.2rem;margin-bottom:10px;box-shadow:0 2px 10px rgba(139,115,85,0.08);}
.qa-q{font-size:14px;font-weight:700;color:#3d2f24;margin-bottom:6px;}
.qa-a{font-size:13px;color:#5a4a3a;line-height:1.7;}

/* CHECKIN PAGE */
.health-summary{background:linear-gradient(135deg,#fef9f3,#f5f0e8);border-radius:16px;padding:1.25rem;margin-bottom:1rem;border:1.5px solid #e8dcc8;}
.health-date{font-size:12px;color:#999;margin-bottom:8px;}
.health-score{display:flex;align-items:baseline;gap:6px;margin-bottom:4px;}
.health-score-num{font-size:42px;font-weight:700;color:#8B7355;}
.health-score-unit{font-size:14px;color:#999;}
.health-msg{font-size:14px;color:#5a4a3a;font-weight:500;}
.progress-bar{background:#e8dcc8;border-radius:8px;height:8px;margin-top:10px;overflow:hidden;}
.progress-fill{height:100%;border-radius:8px;background:linear-gradient(90deg,#8B7355,#A67C5B);transition:width 0.5s ease;}

.section-title{font-size:13px;font-weight:700;color:#8B7355;letter-spacing:1px;margin:1rem 0 8px;padding-left:2px;}

/* HEALTH CARDS */
.health-card{background:white;border-radius:14px;padding:1rem 1.2rem;margin-bottom:10px;box-shadow:0 2px 10px rgba(139,115,85,0.08);}
.health-card-title{font-size:14px;font-weight:600;color:#3d2f24;margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.weight-input-wrap{display:flex;align-items:center;gap:10px;}
.weight-input{width:120px;padding:10px 14px;border:1.5px solid #d4c4b0;border-radius:10px;font-size:18px;font-weight:600;color:#3d2f24;text-align:center;outline:none;}
.weight-input:focus{border-color:#A67C5B;}
.weight-unit{font-size:14px;color:#999;}
.water-grid{display:flex;flex-wrap:wrap;gap:8px;}
.water-cup{width:36px;height:36px;border-radius:8px;border:2px solid #d4c4b0;background:white;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;transition:all 0.2s;}
.water-cup.filled{background:#A4E5E0;border-color:#5BBDB7;}
.diet-grid{display:flex;gap:10px;}
.diet-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px 6px;border-radius:12px;border:2px solid #d4c4b0;cursor:pointer;transition:all 0.2s;}
.diet-item.done{border-color:#8B7355;background:#fef9f3;}
.diet-icon{font-size:24px;}
.diet-label{font-size:11px;color:#888;font-weight:500;text-align:center;}
.diet-ratio{font-size:10px;color:#aaa;}
.diet-check{width:22px;height:22px;border-radius:50%;border:2px solid #d4c4b0;display:flex;align-items:center;justify-content:center;font-size:12px;}
.diet-item.done .diet-check{background:#8B7355;border-color:#8B7355;color:white;}

/* PRODUCT CHECKIN */
.prod-card{background:white;border-radius:14px;padding:1rem 1.2rem;margin-bottom:10px;box-shadow:0 2px 10px rgba(139,115,85,0.08);}
.prod-row{display:flex;align-items:center;gap:12px;}
.prod-icon{width:44px;height:44px;border-radius:12px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0;}
.prod-info{flex:1;}
.prod-name{font-size:14px;font-weight:700;color:#3d2f24;}
.prod-rate{font-size:12px;color:#999;margin-top:2px;}
.prod-check-btn{width:36px;height:36px;border-radius:50%;border:2px solid #d4c4b0;background:white;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex-shrink:0;}
.prod-check-btn.checked{background:#8B7355;border-color:#8B7355;color:white;}
.cal-mini{display:flex;gap:3px;margin-top:8px;flex-wrap:wrap;}
.cal-dot{width:20px;height:20px;border-radius:5px;background:#f5f0e8;display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;}
.cal-dot.done{background:#8B7355;color:white;}
.cal-dot.today{outline:2px solid #A67C5B;}

/* PROFILE */
.profile-card{background:white;border-radius:14px;padding:1.2rem;margin-bottom:1rem;box-shadow:0 2px 10px rgba(139,115,85,0.08);}
.profile-row{display:flex;justify-content:space-between;padding:10px 0;border-bottom:1px solid #f5f0e8;}
.profile-row:last-child{border-bottom:none;}
.profile-label{font-size:13px;color:#999;}
.profile-value{font-size:14px;font-weight:600;color:#3d2f24;}
.btn-primary{background:linear-gradient(135deg,#8B7355,#A67C5B);color:white;border:none;border-radius:10px;padding:12px;font-size:14px;font-weight:600;cursor:pointer;width:100%;}
.btn-secondary{background:#f5f0e8;color:#5a4a3a;border:none;border-radius:10px;padding:12px;font-size:14px;cursor:pointer;width:100%;margin-top:8px;}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="loginPage">
  <div class="login-brand">
    <h1>HT 團隊</h1>
    <h2>客人專屬 產品小錦囊</h2>
  </div>
  <div class="login-tagline">— 一切都在變好 從我們相遇開始 —</div>
  <div class="login-card">
    <div class="login-tabs">
      <button class="login-tab active" onclick="switchLoginTab('login',this)">登入</button>
      <button class="login-tab" onclick="switchLoginTab('register',this)">註冊</button>
    </div>
    <div id="loginForm">
      <input type="text" id="loginSeller" placeholder="賣家名字" />
      <input type="text" id="loginAccount" placeholder="帳號" />
      <input type="password" id="loginPwd" placeholder="密碼" />
      <button class="login-btn" onclick="doLogin()">登入</button>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regSeller" placeholder="你的賣家名字" />

      <input type="password" id="regPwd" placeholder="設定密碼" />
      <input type="password" id="regPwd2" placeholder="確認密碼" />
      <button class="login-btn" onclick="doRegister()">立即註冊</button>
    </div>
    <div class="login-msg" id="loginMsg"></div>
  </div>
</div>

<!-- PRODUCT SELECT MODAL -->
<div id="productModal" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,0.8);z-index:9999;overflow-y:auto;padding:1.5rem;">

          <div class="diet-ratio">佔 1 份</div>
          <div class="diet-check" id="check-rice"></div>
        </div>
      </div>
    </div>

    <div class="section-title">💊 今日產品打卡</div>
    <div id="prodCheckinList"></div>
  </div>

  <!-- 產品功效 -->
  <div class="page" id="page-info">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="infoSearch" placeholder="搜尋產品名稱、功效..." oninput="filterInfo()" />
    </div>
    <div class="cat-scroll" id="infoCatBtns"></div>
    <div id="infoList"></div>
  </div>

  <!-- Q&A -->
  <div class="page" id="page-qa">
    <div class="search-box">
      <span>🔍</span>
      <input type="text" id="qaSearch" placeholder="搜尋問題..." oninput="filterQA()" />
    </div>
    <div class="cat-scroll" id="qaCatBtns"></div>
    <div id="qaList"></div>
  </div>

  <!-- 個人 -->
  <div class="page" id="page-profile">
    <div class="profile-card">
      <div style="font-size:15px;font-weight:700;color:#5a4a3a;margin-bottom:10px;">👤 我的資訊</div>
      <div class="profile-row"><span class="profile-label">賣家</span><span class="profile-value" id="profileSeller"></span></div>
      <div class="profile-row"><span class="profile-label">帳號</span><span class="profile-value" id="profileAccount"></span></div>
      <div class="profile-row"><span class="profile-label">暱稱</span><span class="profile-value" id="profileNickname"></span></div>
    </div>
    <div class="profile-card">
      <div style="font-size:15px;font-weight:700;color:#5a4a3a;margin-bottom:10px;">📦 我的產品</div>
      <div id="myProductsDisplay" style="font-size:13px;color:#666;line-height:1.8;"></div>
      <button class="btn-secondary" onclick="reopenProductSelect()">重新選擇產品</button>
    </div>
    <button class="btn-primary" style="margin-top:8px;" onclick="doLogout()">登出</button>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('checkin',this)">
      <span class="nav-icon">📋</span><span class="nav-label">每日記錄</span>
    </button>
    <button class="nav-item" onclick="switchPage('info',this)">

    <button class="nav-item" onclick="switchPage('qa',this)">

    </button>
    <button class="nav-item" onclick="switchPage('profile',this)">
      <span class="nav-icon">👤</span><span class="nav-label">我的</span>
    </button>
  </div>
</div>

let currentUser=null;

let checkIns={};
let healthData={};

// ===== LOGIN =====
function switchLoginTab(tab,el){
  document.querySelectorAll('.login-tab').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('loginForm').style.display=tab==='login'?'block':'none';
  document.getElementById('registerForm').style.display=tab==='register'?'block':'none';
  document.getElementById('loginMsg').textContent='';
}

async function doLogin(){
  const seller=document.getElementById('loginSeller').value.trim();
  const account=document.getElementById('loginAccount').value.trim();
  const pwd=document.getElementById('loginPwd').value.trim();
  const msg=document.getElementById('loginMsg');
  if(!seller||!account||!pwd){msg.textContent='請填寫所有欄位';return;}
  const {data}=await sb.from('customer_users').select('*').eq('seller_name',seller).eq('account',account).eq('password',pwd).single();
  if(!data){msg.textContent='帳號或密碼錯誤';return;}
  currentUser=data;
  try{selectedProducts=JSON.parse(currentUser.my_products||'[]');}catch(e){selectedProducts=[];}
  if(selectedProducts.length===0){showProductModal();}
  else{enterApp();}
}

async function doRegister(){
  const seller=document.getElementById('regSeller').value.trim();
  const account=document.getElementById('regAccount').value.trim();
  const nickname=document.getElementById('regNickname').value.trim();
  const pwd=document.getElementById('regPwd').value.trim();
  const pwd2=document.getElementById('regPwd2').value.trim();
  const msg=document.getElementById('loginMsg');
  if(!seller||!account||!nickname||!pwd){msg.textContent='請填寫所有欄位';return;}
  if(pwd!==pwd2){msg.textContent='兩次密碼不一致';return;}
  if(pwd.length<4){msg.textContent='密碼至少4個字元';return;}
  const {data:existing}=await sb.from('customer_users').select('id').eq('seller_name',seller).eq('account',account).single();
  if(existing){msg.textContent='此帳號已被使用';return;}
  const {data:newUser}=await sb.from('customer_users').insert({seller_name:seller,account,nickname,password:pwd,my_products:'[]',created_at:new Date().toISOString()}).select().single();
  if(!newUser){msg.textContent='註冊失敗，請再試一次';return;}
  currentUser=newUser;selectedProducts=[];
  showProductModal();
}

function showProductModal(){
  document.getElementById('loginPage').style.display='none';
  const list=document.getElementById('productSelectList');
  list.innerHTML=ALL_PRODUCTS.map(p=>{
    const sel=selectedProducts.includes(p.id);
    return `<div onclick="toggleProd(${p.id})" id="psel-${p.id}" style="display:flex;align-items:center;gap:12px;padding:10px;border-radius:10px;margin-bottom:6px;cursor:pointer;border:2px solid ${sel?'#8B7355':'#e8dcc8'};background:${sel?'#fef9f3':'white'};">
      <div style="font-size:22px;">${p.icon}</div>
      <div style="flex:1;"><div style="font-size:14px;font-weight:600;color:#3d2f24;">${p.name}</div><div style="font-size:11px;color:#999;">${p.cat}</div></div>
      <div style="width:22px;height:22px;border-radius:50%;border:2px solid ${sel?'#8B7355':'#d4c4b0'};background:${sel?'#8B7355':'white'};display:flex;align-items:center;justify-content:center;color:white;font-size:12px;" id="pcheck-${p.id}">${sel?'✓':''}</div>
    </div>`;
  }).join('');
  document.getElementById('productModal').style.display='block';
}

function toggleProd(id){
  if(selectedProducts.includes(id)){selectedProducts=selectedProducts.filter(x=>x!==id);}
  else{selectedProducts.push(id);}
  const el=document.getElementById('psel-'+id);
  const check=document.getElementById('pcheck-'+id);
  const sel=selectedProducts.includes(id);
  el.style.border=`2px solid ${sel?'#8B7355':'#e8dcc8'}`;
  el.style.background=sel?'#fef9f3':'white';
  check.style.background=sel?'#8B7355':'white';
  check.style.border=`2px solid ${sel?'#8B7355':'#d4c4b0'}`;
  check.textContent=sel?'✓':'';
}

async function saveProductSelection(){
  if(selectedProducts.length===0){alert('請至少選擇一個產品');return;}
  await sb.from('customer_users').update({my_products:JSON.stringify(selectedProducts)}).eq('id',currentUser.id);
  currentUser.my_products=JSON.stringify(selectedProducts);
  document.getElementById('productModal').style.display='none';
  enterApp();
}

function reopenProductSelect(){
  document.getElementById('mainPage').style.display='none';
  showProductModal();
}

function enterApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('productModal').style.display='none';
  document.getElementById('mainPage').style.display='block';
  document.getElementById('profileSeller').textContent=currentUser.seller_name;
  document.getElementById('profileAccount').textContent=currentUser.account;
  document.getElementById('profileNickname').textContent=currentUser.nickname||'—';
  const myProds=ALL_PRODUCTS.filter(p=>selectedProducts.includes(p.id));
  document.getElementById('myProductsDisplay').textContent=myProds.map(p=>p.name).join('、')||'尚未選擇';
  loadAll();
}

async function loadAll(){
  const today=getTodayStr();
  const d=new Date();
  document.getElementById('todayDateDisplay').textContent=d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日 健康記錄';
  await loadCheckIns();
  await loadHealthData();
  await loadInfo();
  await loadQA();
  renderCheckinPage();
}

function doLogout(){
  currentUser=null;selectedProducts=[];checkIns={};healthData={};
  document.getElementById('mainPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  ['loginSeller','loginAccount','loginPwd'].forEach(id=>document.getElementById(id).value='');
}

function getTodayStr(){const d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0');}

function switchPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
}

// ===== HEALTH DATA =====
async function loadHealthData(){
  const today=getTodayStr();
  const {data}=await sb.from('daily_health').select('*').eq('user_id',currentUser.id).eq('record_date',today).single();
  healthData=data||{water_cups:0,weight:null,veg_done:false,meat_done:false,rice_done:false};
}

async function saveHealthField(field,value){
  const today=getTodayStr();
  const existing=await sb.from('daily_health').select('id').eq('user_id',currentUser.id).eq('record_date',today).single();
  if(existing.data){
    await sb.from('daily_health').update({[field]:value}).eq('id',existing.data.id);
  } else {
    await sb.from('daily_health').insert({user_id:currentUser.id,record_date:today,[field]:value});
  }
  healthData[field]=value;
  updateScore();
}

// ===== WATER =====
function renderWaterGrid(){
  const cups=healthData.water_cups||0;
  document.getElementById('waterCount').textContent=cups+' / 8 杯';
  let html='';
  for(let i=0;i<8;i++){
    html+=`<div class="water-cup${i<cups?' filled':''}" onclick="toggleWater(${i+1})">💧</div>`;
  }
  document.getElementById('waterGrid').innerHTML=html;
}

async function toggleWater(cup){
  const current=healthData.water_cups||0;
  const newVal=cup===current?cup-1:cup;
  await saveHealthField('water_cups',Math.max(0,newVal));
  renderWaterGrid();
}

// ===== WEIGHT =====
async function saveWeight(){
  const val=parseFloat(document.getElementById('weightInput').value);
  if(!val||val<20||val>300){alert('請輸入正確的體重（20-300kg）');return;}
  await saveHealthField('weight',val);
  document.getElementById('weightHistory').textContent='✓ 今日體重已記錄：'+val+' kg';
  document.getElementById('weightInput').value='';
}

// ===== DIET =====
function renderDietGrid(){
  ['veg','meat','rice'].forEach(type=>{
    const done=healthData[type+'_done'];
    const el=document.getElementById('diet-'+type);
    const check=document.getElementById('check-'+type);
    if(done){el.classList.add('done');check.textContent='✓';}
    else{el.classList.remove('done');check.textContent='';}
  });
}

async function toggleDiet(type){
  const newVal=!healthData[type+'_done'];
  await saveHealthField(type+'_done',newVal);
  renderDietGrid();
}

// ===== PRODUCT CHECKIN =====
async function loadCheckIns(){
  const {data}=await sb.from('product_check_ins').select('*').eq('user_id',currentUser.id);
  checkIns={};
  (data||[]).forEach(c=>{
    if(!checkIns[c.product_id])checkIns[c.product_id]=[];
    checkIns[c.product_id].push(c.check_date);
  });
}

async function toggleProdCheck(prodId){
  const today=getTodayStr();
  const checked=checkIns[prodId]&&checkIns[prodId].includes(today);
  if(checked){
    await sb.from('product_check_ins').delete().eq('user_id',currentUser.id).eq('product_id',prodId).eq('check_date',today);
    checkIns[prodId]=checkIns[prodId].filter(d=>d!==today);
  } else {
    await sb.from('product_check_ins').insert({user_id:currentUser.id,product_id:prodId,check_date:today});
    if(!checkIns[prodId])checkIns[prodId]=[];
    checkIns[prodId].push(today);
  }
  renderCheckinPage();
}

function renderCheckinPage(){
  const today=getTodayStr();
  renderWaterGrid();
  renderDietGrid();
  if(healthData.weight){document.getElementById('weightHistory').textContent='✓ 今日體重已記錄：'+healthData.weight+' kg';}
  if(healthData.water_cups){document.getElementById('weightInput').value='';}

  const myProds=ALL_PRODUCTS.filter(p=>selectedProducts.includes(p.id));
  const last14=[];
  for(let i=13;i>=0;i--){const d=new Date();d.setDate(d.getDate()-i);last14.push(d.toISOString().split('T')[0]);}

  document.getElementById('prodCheckinList').innerHTML=myProds.map(p=>{
    const isChecked=checkIns[p.id]&&checkIns[p.id].includes(today);
    const last7=last14.slice(-7);
    const doneCount=last7.filter(d=>checkIns[p.id]&&checkIns[p.id].includes(d)).length;
    const pct=Math.round(doneCount/7*100);
    const dots=last14.map((d,i)=>{
      const done=checkIns[p.id]&&checkIns[p.id].includes(d);
      const isToday=d===today;
      return `<div class="cal-dot${done?' done':''}${isToday?' today':''}">${new Date(d).getDate()}</div>`;
    }).join('');
    return `<div class="prod-card">
      <div class="prod-row">
        <div class="prod-icon">${p.icon}</div>
        <div class="prod-info">
          <div class="prod-name">${p.name}</div>
          <div class="prod-rate">近7天完成率 ${pct}%</div>
        </div>
        <div class="prod-check-btn${isChecked?' checked':''}" onclick="toggleProdCheck(${p.id})">${isChecked?'✓':''}</div>
      </div>
      <div class="cal-mini">${dots}</div>
    </div>`;
  }).join('')||'<div style="text-align:center;padding:2rem;color:#aaa;font-size:14px;">請先選擇你的產品</div>';

  updateScore();
}

function updateScore(){
  const myProds=ALL_PRODUCTS.filter(p=>selectedProducts.includes(p.id));
  const today=getTodayStr();
  let total=0,done=0;
  // Water (1 item)
  total++;if((healthData.water_cups||0)>=6)done++;
  // Weight (1 item)
  total++;if(healthData.weight)done++;
  // Diet (3 items)
  total+=3;
  if(healthData.veg_done)done++;
  if(healthData.meat_done)done++;
  if(healthData.rice_done)done++;
  // Products
  myProds.forEach(p=>{total++;if(checkIns[p.id]&&checkIns[p.id].includes(today))done++;});
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('todayScore').textContent=pct;
  document.getElementById('progressFill').style.width=pct+'%';
  const msgs=['今天從這裡開始！加油！','很好的開始，繼續！','做得不錯，再加把勁！','超棒！繼續保持！','太優秀了！完美的一天！'];
  document.getElementById('todayMsg').textContent=msgs[Math.floor(pct/25)]||msgs[4];
}

// ===== PRODUCT INFO =====
async function loadInfo(){
  const {data}=await sb.from('customer_products').select('*').eq('is_active',true);
  infoData=data||[];
  const cats=[...new Set(infoData.map(p=>p.category).filter(Boolean))];
  const btnEl=document.getElementById('infoCatBtns');
  btnEl.innerHTML=`<button class="cat-btn active" onclick="setInfoCat('all',this)">全部</button>`+cats.map(c=>`<button class="cat-btn" onclick="setInfoCat('${c}',this)">${c}</button>`).join('');
  renderInfo();
}

function setInfoCat(cat,el){
  infoCatFilter=cat;
  document.querySelectorAll('#infoCatBtns .cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderInfo();
}

function filterInfo(){renderInfo();}

function renderInfo(){
  const q=document.getElementById('infoSearch').value.toLowerCase();
  let list=infoData;
  if(infoCatFilter!=='all')list=list.filter(p=>p.category===infoCatFilter);
  if(q)list=list.filter(p=>(p.name||'').toLowerCase().includes(q)||(p.effect||'').toLowerCase().includes(q)||(p.usage||'').toLowerCase().includes(q));
  const el=document.getElementById('infoList');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#aaa;">找不到相關產品</div>';return;}
  el.innerHTML=list.map(p=>`<div class="info-card">
    <div class="info-title">${p.name}</div>
    <span class="cat-tag">${p.category||''}</span>
    ${p.effect?`<div style="margin-bottom:10px;"><div class="info-label">✨ 產品功效</div><div class="info-content">${p.effect}</div></div>`:''}
    ${p.usage?`<div><div class="info-label">📖 使用方法/吃法</div><div class="info-content">${p.usage}</div></div>`:''}
  </div>`).join('');
}

// ===== QA =====
async function loadQA(){
  const {data}=await sb.from('product_qa').select('*').eq('is_active',true).order('created_at',{ascending:false});
  qaData=data||[];
  const cats=[...new Set(qaData.map(q=>q.category).filter(Boolean))];
  const btnEl=document.getElementById('qaCatBtns');
  btnEl.innerHTML=`<button class="cat-btn active" onclick="setQACat('all',this)">全部</button>`+cats.map(c=>`<button class="cat-btn" onclick="setQACat('${c}',this)">${c}</button>`).join('');
  renderQA();
}

function setQACat(cat,el){
  qaCatFilter=cat;
  document.querySelectorAll('#qaCatBtns .cat-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');renderQA();
}

function filterQA(){renderQA();}

function renderQA(){
  const q=document.getElementById('qaSearch').value.toLowerCase();
  let list=qaData;
  if(qaCatFilter!=='all')list=list.filter(x=>x.category===qaCatFilter);
  if(q)list=list.filter(x=>(x.question||'').toLowerCase().includes(q)||(x.answer||'').toLowerCase().includes(q));
  const el=document.getElementById('qaList');
  if(!list.length){el.innerHTML='<div style="text-align:center;padding:2rem;color:#aaa;">找不到相關問題</div>';return;}
  el.innerHTML=list.map(q=>`<div class="qa-card">
    ${q.category?`<span style="font-size:11px;padding:2px 8px;border-radius:8px;background:#f5f0e8;color:#8B7355;font-weight:600;display:inline-block;margin-bottom:6px;">${q.category}</span>`:''}
    <div class="qa-q">Q：${q.question}</div>
    <div class="qa-a">A：${q.answer}</div>
  </div>`).join('');
}
</script>
</body>
</html>
