*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:url('HT1.jpg') center/cover no-repeat;}
.login-header{text-align:center;margin-bottom:2rem;}

.login-header p{font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px;}
.login-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 30px rgba(0,0,0,0.2);}
.login-card input,.login-card select{width:100%;padding:12px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;background:white;color:#333;appearance:none;}

.login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#C9A884,#A67C5B);color:white;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:1px;}
.login-switch{text-align:center;margin-top:14px;font-size:13px;color:#888;}

.msg{font-size:13px;color:#E24B4A;text-align:center;margin-top:8px;min-height:20px;}
#mainPage{display:none;padding-bottom:80px;}
.app-header{padding:1.25rem 1.25rem 1rem;text-align:center;color:white;}
.app-header h1{font-size:20px;font-weight:500;letter-spacing:2px;}
.level-tag{display:inline-block;padding:3px 14px;border-radius:20px;background:rgba(255,255,255,0.25);font-size:12px;margin-top:6px;}
.user-name{font-size:13px;opacity:0.8;margin-top:4px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:0.5px solid #eee;display:flex;z-index:100;}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;border:none;background:none;}
.nav-icon{font-size:20px;display:block;margin-bottom:2px;}
.nav-label{font-size:10px;color:#aaa;}
.nav-item.active .nav-label{color:#5BBDB7;font-weight:500;}
.page{display:none;padding:1rem;}
.page.active{display:block;}
.card{background:white;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
.card-title{font-size:13px;color:#888;margin-bottom:12px;letter-spacing:0.5px;}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.metric{background:#f8f8f8;border-radius:10px;padding:10px;text-align:center;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;}
.metric-value{font-size:17px;font-weight:500;color:#333;}
.field{margin-bottom:10px;}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;background:#fafafa;outline:none;color:#333;}
.field input:focus,.field select:focus{border-color:#A4E5E0;background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:4px;}
.btn-primary{background:#A4E5E0;color:#085041;}
.item-row{display:grid;grid-template-columns:1fr 58px 72px 28px;gap:6px;align-items:center;padding:8px 10px;background:#f8f8f8;border-radius:10px;margin-bottom:6px;}
.item-row select{font-size:12px;padding:5px 6px;border-radius:7px;border:0.5px solid #ddd;background:white;color:#333;}
.item-row input{padding:5px 8px;border-radius:7px;border:0.5px solid #ddd;background:white;text-align:center;font-size:13px;color:#333;}
.item-cost{font-size:11px;color:#888;text-align:right;line-height:1.4;}
.remove-btn{background:none;border:none;color:#bbb;font-size:18px;cursor:pointer;padding:0;}
.add-item-btn{width:100%;padding:9px;border:0.5px dashed #ccc;border-radius:10px;background:transparent;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f0f0;}
.result-row:last-child{border-bottom:none;}
.result-label{font-size:14px;color:#888;}
.result-value{font-size:15px;font-weight:500;color:#333;}
.chart-wrap{position:relative;width:100%;height:200px;margin-top:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;color:#888;}
.legend span{display:flex;align-items:center;gap:4px;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.tabs{display:flex;gap:6px;margin-bottom:1rem;}
.tab{padding:7px 14px;border-radius:18px;border:0.5px solid #ddd;background:transparent;color:#888;font-size:12px;cursor:pointer;}
.tab.active{background:#A4E5E0;border-color:#76D5CF;color:#085041;font-weight:500;}
.logout-btn{display:block;text-align:center;padding:12px;color:#aaa;font-size:13px;cursor:pointer;margin-top:1rem;}
.bg-intern{background:linear-gradient(135deg,#A4E5E0,#76D5CF);}
.bg-3{background:linear-gradient(135deg,#8DDDD7,#5BBDB7);}
.bg-3c{background:linear-gradient(135deg,#76D5CF,#4BBDB7);}

.today-sub{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:0.5px solid #f0f0f0;}
.rec-item{padding:8px 0;border-bottom:0.5px solid #f5f5f5;}
.rec-item:last-child{border-bottom:none;}

<div id="loginPage">

      <input type="password" id="loginPwd" placeholder="密碼" />
      <button class="login-btn" onclick="doLogin()">登入</button>
      <div class="login-switch">還沒有帳號？<a onclick="showRegister()">立即申請</a></div>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUpline" placeholder="上家姓名" />
      <select id="regLevel">
        <option value="">— 選擇申請級別 —</option>
        <option value="實習">實習</option>
        <option value="三級">三級</option>
        <option value="三級輔導">三級輔導</option>
        <option value="二級">二級</option>
        <option value="二級輔導">二級輔導</option>
        <option value="一級">一級</option>
        <option value="一級輔導">一級輔導</option>
        <option value="皇家">皇家</option>
        <option value="皇家輔導">皇家輔導</option>
      </select>
      <input type="text" id="regName" placeholder="姓名" />
      <input type="text" id="regPhone" placeholder="手機號碼" maxlength="10" />
      <input type="password" id="regPwd" placeholder="設定密碼" />
      <button class="login-btn" onclick="doRegister()">送出申請</button>
      <div class="login-switch">已有帳號？<a onclick="showLogin()">返回登入</a></div>
    </div>

  </div>
</div>

        <button class="btn btn-primary" onclick="saveInitFans()">儲存</button>

    </div>
  </div>

    <div class="card" style="text-align:center;padding:3rem 1rem;">
      <div style="font-size:40px;margin-bottom:1rem;">📚</div>
      <div style="font-size:16px;font-weight:500;color:#333;margin-bottom:8px;">成長系統</div>

    <div class="card" style="text-align:center;padding:3rem 1rem;">
      <div style="font-size:40px;margin-bottom:1rem;">✅</div>
      <div style="font-size:16px;font-weight:500;color:#333;margin-bottom:8px;">檢核系統</div>
      <div style="font-size:13px;color:#aaa;">即將推出，敬請期待</div>

  <!-- 個人頁面 -->

      <button class="btn btn-primary" onclick="updateName()">儲存姓名</button>
    </div>

    <div class="logout-btn" onclick="doLogout()">登出</div>
  </div>

  <div class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('profit',this)">
      <span class="nav-icon">💰</span><span class="nav-label">淨利</span>
    </button>
    <button class="nav-item" onclick="switchPage('course',this)">
      <span class="nav-icon">📚</span><span class="nav-label">成長</span>
    </button>
    <button class="nav-item" onclick="switchPage('check',this)">
      <span class="nav-icon">✅</span><span class="nav-label">檢核</span>
    </button>
    <button class="nav-item" onclick="switchPage('profile',this)">
      <span class="nav-icon">👤</span><span class="nav-label">我的</span>
    </button>
  </div>
</div>

function getMonthStr(){
  const d = new Date();
  return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');
}

function showRegister(){
  document.getElementById('loginForm').style.display='none';
  document.getElementById('registerForm').style.display='block';
  document.getElementById('loginMsg').textContent='';
}
function showLogin(){
  document.getElementById('registerForm').style.display='none';
  document.getElementById('loginForm').style.display='block';
  document.getElementById('loginMsg').textContent='';
}

async function doRegister(){
  const upline = document.getElementById('regUpline').value.trim();
  const level = document.getElementById('regLevel').value;
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const pwd = document.getElementById('regPwd').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!upline||!level||!name||!phone||!pwd){msg.textContent='請填寫所有欄位';return;}
  const existing = await sb.from('users').select('id').eq('phone',phone).single();
  if(existing.data){msg.textContent='此手機號碼已申請過';return;}
  const {error} = await sb.from('users').insert({name,phone,password:pwd,upline,level,status:'待審核',init_fans:0});
  if(error){msg.textContent='申請失敗，請再試一次';return;}
  msg.style.color='#1D9E75';
  msg.textContent='申請成功！請等待管理員審核後登入';
  setTimeout(showLogin,2000);
}

async function doLogin(){
  const phone = document.getElementById('loginPhone').value.trim();
  const pwd = document.getElementById('loginPwd').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!phone||!pwd){msg.textContent='請填寫手機號碼和密碼';return;}
  const {data} = await sb.from('users').select('*').eq('phone',phone).eq('password',pwd).single();
  if(!data){msg.textContent='手機號碼或密碼錯誤';return;}
  if(data.status==='待審核'){msg.textContent='帳號審核中，請等待管理員審核';return;}
  currentUser = data;
  enterApp();
}

function enterApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainPage').style.display='block';
  const header = document.getElementById('appHeader');
  header.className = 'app-header '+(LEVEL_BG[currentUser.level]||'bg-intern');
  document.getElementById('headerName').textContent = currentUser.name;
  document.getElementById('headerLevel').textContent = currentUser.level;
  document.getElementById('profileName').textContent = currentUser.name;
  document.getElementById('profilePhone').textContent = currentUser.phone;
  document.getElementById('profileUpline').textContent = currentUser.upline||'—';
  document.getElementById('profileLevel').textContent = currentUser.level;
  document.getElementById('profileStatus').textContent = currentUser.status;
  document.getElementById('initFansInput').value = currentUser.init_fans||0;
  const d = new Date();
  document.getElementById('todayDisplay').textContent = d.getFullYear()+'年'+(d.getMonth()+1)+'月'+d.getDate()+'日';
  renderSaleItems();
  loadSalesData();
  loadFansRecordOnInput();
}

async function loadFansRecordOnInput(){
  if(!currentUser) return;
  const {data:mData} = await sb.from('monthly_data').select('*').eq('user_id',currentUser.id).order('id',{ascending:false});
  renderFansRecordList(mData||[]);
}

function doLogout(){
  currentUser=null;
  document.getElementById('mainPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPhone').value='';
  document.getElementById('loginPwd').value='';
}

function switchPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
}

function switchSubTab(section,tab){
  const inputEl = document.getElementById(section+'-input');
  const chartEl = document.getElementById(section+'-chart');
  const tabs = document.querySelectorAll('#page-'+section+' .tab');
  tabs.forEach((t,i)=>t.classList.toggle('active',i===(tab==='input'?0:1)));
  if(tab==='input'){inputEl.style.display='block';chartEl.style.display='none';}
  else{inputEl.style.display='none';chartEl.style.display='block';loadSalesData().then(renderCharts);}
}

function renderSaleItems(){
  const level = currentUser?currentUser.level:'實習';
  const container = document.getElementById('salesItems');
  container.innerHTML = saleItems.map((item,i)=>{
    const cost = PRODUCTS[item.productIdx].costs[level]||0;
    const options = PRODUCTS.map((p,pi)=>`<option value="${pi}"${pi===item.productIdx?' selected':''}>${p.name}</option>`).join('');
    return `<div class="item-row">
      <select onchange="changeProd(${i},this.value)">${options}</select>
      <input type="number" min="1" value="${item.qty}" onchange="changeQty(${i},this.value)" />
      <div class="item-cost">$${cost.toLocaleString()}<br>共$${(cost*item.qty).toLocaleString()}</div>
      <button class="remove-btn" onclick="removeItem(${i})">×</button>
    </div>`;
  }).join('');
}
function addSaleItem(){saleItems.push({productIdx:0,qty:1});renderSaleItems();}
function changeProd(i,v){saleItems[i].productIdx=parseInt(v);renderSaleItems();}
function changeQty(i,v){saleItems[i].qty=Math.max(1,parseInt(v)||1);renderSaleItems();}
function removeItem(i){if(saleItems.length>1)saleItems.splice(i,1);renderSaleItems();}

async function saveRecord(){
  const level = currentUser.level;
  const today = getTodayStr();
  const revenue = parseInt(document.getElementById('totalRevenue').value)||0;
  if(revenue===0){alert('請輸入收款金額');return;}
  let totalCost = 0;
  const itemsSnap = saleItems.map(item=>{
    const cost = PRODUCTS[item.productIdx].costs[level]||0;
    totalCost += cost*item.qty;
    return {name:PRODUCTS[item.productIdx].name,qty:item.qty,cost};
  });
  const profit = revenue - totalCost;
  const now = new Date();
  await sb.from('sales_data').insert({
    user_id:currentUser.id,
    date:today,
    year:now.getFullYear(),
    month:now.getMonth()+1,
    product_name:JSON.stringify(itemsSnap),
    quantity:saleItems.reduce((a,i)=>a+i.qty,0),
    cost:totalCost,
    total_revenue:revenue
  });
  saleItems=[{productIdx:0,qty:1}];
  document.getElementById('totalRevenue').value='';
  renderSaleItems();
  await loadSalesData();
  alert('已新增！本次淨利 NT$'+profit.toLocaleString());
}

async function saveFansData(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth()+1;
  const currentFansVal = parseInt(document.getElementById('currentFans').value)||0;
  const videos = parseInt(document.getElementById('videoCount').value)||0;
  const newC = parseInt(document.getElementById('newClients').value)||0;
  const retC = parseInt(document.getElementById('returnClients').value)||0;

  // 取上月粉絲數，沒有上月資料就用初始粉絲
  const prevMonth = month===1?12:month-1;
  const prevYear = month===1?year-1:year;
  const {data:prevRows} = await sb.from('monthly_data').select('current_fans').eq('user_id',currentUser.id).eq('year',prevYear).eq('month',prevMonth).order('id',{ascending:false}).limit(1);
  const prevFans = prevRows&&prevRows.length ? (prevRows[0].current_fans||0) : (currentUser.init_fans||0);
  const fansGain = currentFansVal - prevFans;

  // 先刪除同月所有舊資料，再新增（確保只有一筆最新）
  await sb.from('monthly_data').delete().eq('user_id',currentUser.id).eq('year',year).eq('month',month);
  await sb.from('monthly_data').insert({user_id:currentUser.id,year,month,current_fans:currentFansVal,fans_gain:fansGain,videos,new_clients:newC,return_clients:retC,profit:0,init_fans:currentUser.init_fans||0});

  // 更新下個月的增粉
  const nextMonth = month===12?1:month+1;
  const nextYear = month===12?year+1:year;
  const {data:nextRows} = await sb.from('monthly_data').select('id,current_fans').eq('user_id',currentUser.id).eq('year',nextYear).eq('month',nextMonth).order('id',{ascending:false}).limit(1);
  if(nextRows&&nextRows.length&&nextRows[0].current_fans){
    const nextGain = nextRows[0].current_fans - currentFansVal;
    await sb.from('monthly_data').update({fans_gain:nextGain}).eq('id',nextRows[0].id);
  }

  const sign = fansGain>=0?'+':'';
  await loadFansRecordOnInput();
  if(document.getElementById('profit-chart').style.display!=='none') renderCharts();
  alert('粉絲數據已儲存！本月增粉 '+sign+fansGain.toLocaleString());
}

async function saveInitFans(){
  const v = parseInt(document.getElementById('initFansInput').value)||0;
  await sb.from('users').update({init_fans:v}).eq('id',currentUser.id);
  currentUser.init_fans=v;
  alert('起始粉絲已儲存！');
}

async function loadSalesData(){
  if(!currentUser) return;
  const {data} = await sb.from('sales_data').select('*').eq('user_id',currentUser.id).order('date');
  salesCache = data||[];
  updateTodaySummary();
  renderTodayRecords();
  const chartVisible = document.getElementById('profit-chart').style.display!=='none';
  if(chartVisible) renderCharts();
}

function updateTodaySummary(){
  const today = getTodayStr();
  const monthStr = getMonthStr();
  const todayRecs = salesCache.filter(r=>r.date===today);
  const monthRecs = salesCache.filter(r=>r.date&&r.date.startsWith(monthStr));
  const todayProfit = todayRecs.reduce((a,r)=>a+(r.total_revenue-r.cost),0);
  const monthProfit = monthRecs.reduce((a,r)=>a+(r.total_revenue-r.cost),0);
  const el = document.getElementById('todayProfitDisplay');
  el.textContent = 'NT$'+todayProfit.toLocaleString();
  el.style.color = todayProfit>=0?'#1D9E75':'#E24B4A';
  document.getElementById('monthProfitDisplay').textContent = 'NT$'+monthProfit.toLocaleString();
  document.getElementById('monthCountDisplay').textContent = monthRecs.length+' 筆';
}

function renderTodayRecords(){
  const today = getTodayStr();
  const recs = salesCache.filter(r=>r.date===today);
  const box = document.getElementById('todayRecordsCard');
  const list = document.getElementById('todayList');
  if(!recs.length){box.style.display='none';return;}
  box.style.display='block';
  list.innerHTML = recs.map(r=>{
    let items=[];
    try{items=JSON.parse(r.product_name);}catch(e){}
    const profit = r.total_revenue-r.cost;
    return `<div class="rec-item">
      <div style="display:flex;justify-content:space-between;margin-bottom:3px;">
        <span style="font-size:13px;color:#555;">${items.map(it=>it.name+'×'+it.qty).join('、')}</span>
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:14px;font-weight:500;color:${profit>=0?'#1D9E75':'#E24B4A'};">NT$${profit.toLocaleString()}</span>
          <button onclick="deleteRecord(${r.id})" style="background:none;border:none;color:#ddd;font-size:16px;cursor:pointer;padding:0;">🗑</button>
        </div>
      </div>
      <div style="font-size:12px;color:#aaa;">收款 NT$${r.total_revenue.toLocaleString()} ／ 成本 NT$${r.cost.toLocaleString()}</div>
    </div>`;
  }).join('');
}

function renderCharts(){
  const now = new Date();
  const year = now.getFullYear();
  const month = now.getMonth()+1;
  const daysInMonth = new Date(year,month,0).getDate();
  const dayLabels = Array.from({length:daysInMonth},(_,i)=>(i+1)+'');
  const dayProfits = Array(daysInMonth).fill(0);
  salesCache.filter(r=>r.year===year&&r.month===month).forEach(r=>{
    const day = parseInt(r.date.split('-')[2])-1;
    if(day>=0&&day<daysInMonth) dayProfits[day]+=(r.total_revenue-r.cost);
  });
  if(pChart) pChart.destroy();
  pChart = new Chart(document.getElementById('profitChartCanvas'),{
    type:'bar',
    data:{labels:dayLabels,datasets:[{data:dayProfits,backgroundColor:dayProfits.map(v=>v>=0?'rgba(91,189,183,0.85)':'rgba(226,75,74,0.85)'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{font:{size:10}}},y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'K'}}}}
  });

  const monthProfits = Array(12).fill(0);
  salesCache.filter(r=>r.year===year).forEach(r=>{
    if(r.month>=1&&r.month<=12) monthProfits[r.month-1]+=(r.total_revenue-r.cost);
  });
  const totalYearProfit = monthProfits.reduce((a,v)=>a+v,0);
  if(yChart) yChart.destroy();
  yChart = new Chart(document.getElementById('yearProfitCanvas'),{
    type:'bar',
    data:{labels:ML,datasets:[{data:monthProfits,backgroundColor:monthProfits.map(v=>v>=0?'rgba(91,189,183,0.85)':'rgba(226,75,74,0.85)'),borderRadius:4}]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},
              y:{ticks:{font:{size:10},callback:v=>'$'+Math.round(v/1000)+'K'}}}}
  });

  loadFansCharts(totalYearProfit);
}

async function updateName(){
  const newName = document.getElementById('newNameInput').value.trim();
  if(!newName){alert('請輸入姓名');return;}
  await sb.from('users').update({name:newName}).eq('id',currentUser.id);
  currentUser.name = newName;
  document.getElementById('profileName').textContent = newName;
  document.getElementById('headerName').textContent = newName;
  document.getElementById('newNameInput').value='';
  alert('姓名已更新！');
}

async function deleteRecord(id){
  if(!confirm('確定刪除這筆記錄？')) return;
  await sb.from('sales_data').delete().eq('id',id);
  await loadSalesData();
}



async function loadFansCharts(totalYearProfit){
  const now = new Date();
  const year = now.getFullYear();
  const nowM = now.getMonth()+1;
  const {data:mData} = await sb.from('monthly_data').select('*').eq('user_id',currentUser.id).eq('year',year).order('month');
  const byMonth = Array(12).fill(null).map((_,i)=>(mData||[]).find(m=>m.month===i+1)||null);
  const fans = byMonth.map(m=>m?m.fans_gain:null);
  const videos = byMonth.map(m=>m?m.videos:null);
  const newC = byMonth.map(m=>m?m.new_clients:null);
  const retC = byMonth.map(m=>m?m.return_clients:null);

  // 總粉絲 = current_fans就是當月實際總粉絲數，直接顯示
  // 但若該月沒資料，用前一個有資料月份的值延續顯示
  const cumFans = [];
  let lastKnown = currentUser.init_fans||0;
  byMonth.forEach(m=>{
    if(m&&m.current_fans) lastKnown = m.current_fans;
    cumFans.push(m ? (m.current_fans||lastKnown) : null);
  });

  // 年度增粉 = 最新月份粉絲 - 初始粉絲
  const latestMonth = [...(mData||[])].sort((a,b)=>b.month-a.month)[0];
  const totalFansGain = latestMonth ? (latestMonth.current_fans||0)-(currentUser.init_fans||0) : 0;

  // 當月增粉
  const thisMonthData = (mData||[]).find(m=>m.month===nowM);
  const thisMonthFans = thisMonthData?(thisMonthData.fans_gain||0):0;

  // 影片數文字
  const videoText = byMonth.map((m,i)=>m&&m.videos?(i+1)+'月：'+m.videos+'部':'').filter(Boolean).join('　');
  const vtEl = document.getElementById('videoTextDisplay');
  if(vtEl) vtEl.textContent = videoText ? '影片更新：'+videoText : '';

  document.getElementById('m1').textContent = '$'+(totalYearProfit/1000).toFixed(1)+'K';
  document.getElementById('m1').style.color = totalYearProfit>=0?'#1D9E75':'#E24B4A';
  document.getElementById('m2').textContent = (totalFansGain>=0?'+':'')+totalFansGain.toLocaleString();
  document.getElementById('m2').style.color = totalFansGain>=0?'#1D9E75':'#E24B4A';
  document.getElementById('m3').textContent = (thisMonthFans>=0?'+':'')+thisMonthFans.toLocaleString();
  document.getElementById('m3').style.color = thisMonthFans>=0?'#1D9E75':'#E24B4A';

  const datalabelPlugin = {
    id:'datalabels',
    afterDatasetsDraw(chart){
      const ctx = chart.ctx;
      chart.data.datasets.forEach((ds,di)=>{
        const meta = chart.getDatasetMeta(di);
        if(ds.type==='line') return;
        meta.data.forEach((bar,i)=>{
          const val = ds.data[i];
          if(val===null||val===0) return;
          ctx.fillStyle = '#555';
          ctx.font = '10px sans-serif';
          ctx.textAlign = 'center';
          ctx.fillText(val.toLocaleString(), bar.x, bar.y-4);
        });
      });
    }
  };

  // 堆疊圖：底部=初始粉絲base，上層=增粉
  const baseArr = cumFans.map((v,i)=>v!==null?(v-(fans[i]||0)):null);
  if(fChart) fChart.destroy();
  fChart = new Chart(document.getElementById('fansChartCanvas'),{
    type:'bar',
    data:{labels:ML,datasets:[
      {label:'基礎粉絲',data:baseArr,backgroundColor:'rgba(91,189,183,0.6)',borderRadius:0,stack:'fans'},
      {label:'當月增粉',data:fans.map(v=>v&&v>0?v:null),backgroundColor:'rgba(212,83,126,0.85)',borderRadius:3,stack:'fans'}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{
        x:{stacked:true,ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},
        y:{stacked:true,ticks:{font:{size:10}}}
      }
    },
    plugins:[{
      id:'stackLabels',
      afterDatasetsDraw(chart){
        const ctx=chart.ctx;
        chart.data.datasets.forEach((ds,di)=>{
          const meta=chart.getDatasetMeta(di);
          meta.data.forEach((bar,i)=>{
            const val=ds.data[i];
            if(val===null||val===0) return;
            const totalVal = cumFans[i];
            if(di===1){
              ctx.fillStyle='#D4537E';ctx.font='bold 10px sans-serif';ctx.textAlign='center';
              ctx.fillText('+'+val.toLocaleString(),bar.x,bar.y-4);
            }
            if(di===0&&totalVal){
              ctx.fillStyle='#555';ctx.font='10px sans-serif';ctx.textAlign='center';
              ctx.fillText(totalVal.toLocaleString(),bar.x,bar.y-(fans[i]&&fans[i]>0?20:4));
            }
          });
        });
      }
    }]
  });

  if(cChart) cChart.destroy();
  cChart = new Chart(document.getElementById('clientsChartCanvas'),{
    type:'bar',
    data:{labels:ML,datasets:[
      {label:'新消費者',data:newC,backgroundColor:'rgba(127,119,221,0.85)',borderRadius:3},
      {label:'回購客',data:retC,backgroundColor:'rgba(91,189,183,0.85)',borderRadius:3}
    ]},
    options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},
      scales:{x:{stacked:true,ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},
              y:{stacked:true,ticks:{font:{size:10}}}}},
    plugins:[datalabelPlugin]
  });

  // 載入粉絲記錄列表（我的頁面）
  renderFansRecordList(mData||[]);
}

function renderFansRecordList(mData){
  const list = document.getElementById('fansRecordList');
  if(!list) return;
  if(!mData.length){list.innerHTML='<div style="font-size:13px;color:#aaa;text-align:center;padding:1rem;">尚無記錄</div>';return;}
  const sorted = [...mData].sort((a,b)=>b.month-a.month);
  list.innerHTML = sorted.map(m=>`
    <div class="rec-item">
      <div style="display:flex;justify-content:space-between;align-items:center;">
        <div>
          <div style="font-size:14px;font-weight:500;color:#333;">${m.year}年${m.month}月</div>
          <div style="font-size:12px;color:#aaa;margin-top:2px;">粉絲 ${(m.current_fans||0).toLocaleString()} ／ 增粉 ${m.fans_gain>=0?'+':''}${(m.fans_gain||0).toLocaleString()} ／ 影片 ${m.videos||0}部</div>
          <div style="font-size:12px;color:#aaa;">新客 ${m.new_clients||0} ／ 回購 ${m.return_clients||0}</div>
        </div>
        <button onclick="deleteFansRecord(${m.id})" style="background:none;border:none;color:#ddd;font-size:18px;cursor:pointer;padding:4px;">🗑</button>
      </div>
    </div>`).join('');
}

async function deleteFansRecord(id){
  if(!confirm('確定刪除這筆粉絲數據？')) return;
  await sb.from('monthly_data').delete().eq('id',id);
  const {data:mData} = await sb.from('monthly_data').select('*').eq('user_id',currentUser.id).order('month');
  renderFansRecordList(mData||[]);
  if(document.getElementById('profit-chart').style.display!=='none') renderCharts();
  alert('已刪除！');
}
</script>
