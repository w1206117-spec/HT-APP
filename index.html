<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}

  /* 登入頁面 */
  #loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;}
  .login-header{text-align:center;margin-bottom:2rem;}
  .login-header h1{font-size:28px;font-weight:500;color:#333;letter-spacing:3px;}
  .login-header p{font-size:14px;color:#888;margin-top:6px;}
  .login-card{background:white;border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
  .login-card input{width:100%;padding:12px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;}
  .login-card input:focus{border-color:#A4E5E0;}
  .login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:#A4E5E0;color:#085041;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:1px;}
  .login-switch{text-align:center;margin-top:14px;font-size:13px;color:#888;}
  .login-switch a{color:#5BBDB7;cursor:pointer;text-decoration:none;}
  .msg{font-size:13px;color:#E24B4A;text-align:center;margin-top:8px;min-height:20px;}

  /* 主頁面 */
  #mainPage{display:none;padding-bottom:80px;}
  .app-header{padding:1.25rem 1.25rem 1rem;text-align:center;color:white;}
  .app-header h1{font-size:20px;font-weight:500;letter-spacing:2px;}
  .app-header .level-tag{display:inline-block;padding:3px 14px;border-radius:20px;background:rgba(255,255,255,0.25);font-size:12px;margin-top:6px;}
  .app-header .user-name{font-size:13px;opacity:0.8;margin-top:4px;}

  /* 底部導航 */
  .bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:0.5px solid #eee;display:flex;z-index:100;}
  .nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;border:none;background:none;}
  .nav-icon{font-size:20px;display:block;margin-bottom:2px;}
  .nav-label{font-size:10px;color:#aaa;}
  .nav-item.active .nav-label{color:#5BBDB7;font-weight:500;}

  /* 頁面內容 */
  .page{display:none;padding:1rem 1rem;}
  .page.active{display:block;}

  /* 通用卡片 */
  .card{background:white;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
  .card-title{font-size:13px;color:#888;margin-bottom:12px;letter-spacing:0.5px;}
  .section-title{font-size:15px;font-weight:500;color:#333;margin-bottom:12px;}

  /* 指標卡 */
  .metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
  .metric{background:#f8f8f8;border-radius:10px;padding:10px;text-align:center;}
  .metric-label{font-size:11px;color:#888;margin-bottom:4px;}
  .metric-value{font-size:17px;font-weight:500;color:#333;}

  /* 表單 */
  .field{margin-bottom:10px;}
  .field label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
  .field input,.field select,.field textarea{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;background:#fafafa;outline:none;color:#333;}
  .field input:focus,.field select:focus{border-color:#A4E5E0;background:white;}
  .field textarea{min-height:80px;resize:vertical;}
  .form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .form-row.three{grid-template-columns:1fr 1fr 1fr;}

  /* 按鈕 */
  .btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:4px;}
  .btn-primary{background:#A4E5E0;color:#085041;}
  .btn-danger{background:#ffeaea;color:#E24B4A;}
  .btn-sm{padding:7px 14px;width:auto;font-size:13px;border-radius:8px;}

  /* 品項列 */
  .item-row{display:grid;grid-template-columns:1fr 60px 60px 28px;gap:6px;align-items:center;padding:8px 10px;background:#f8f8f8;border-radius:10px;margin-bottom:6px;}
  .item-row select{font-size:12px;padding:5px 6px;border-radius:7px;border:0.5px solid #ddd;background:white;color:#333;}
  .item-row input{padding:5px 8px;border-radius:7px;border:0.5px solid #ddd;background:white;text-align:center;font-size:13px;color:#333;}
  .item-cost{font-size:11px;color:#888;text-align:right;}
  .remove-btn{background:none;border:none;color:#bbb;font-size:18px;cursor:pointer;padding:0;}
  .add-item-btn{width:100%;padding:9px;border:0.5px dashed #ccc;border-radius:10px;background:transparent;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;}

  /* 結果 */
  .result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f0f0;}
  .result-row:last-child{border-bottom:none;}
  .result-label{font-size:14px;color:#888;}
  .result-value{font-size:15px;font-weight:500;color:#333;}
  .profit-big{font-size:24px;font-weight:500;}
  .profit-pos{color:#1D9E75;}
  .profit-neg{color:#E24B4A;}

  /* 圖表 */
  .chart-wrap{position:relative;width:100%;height:200px;margin-top:8px;}
  .legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;color:#888;}
  .legend span{display:flex;align-items:center;gap:4px;}
  .legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}

  /* 標籤切換 */
  .tabs{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;}
  .tab{padding:7px 14px;border-radius:18px;border:0.5px solid #ddd;background:transparent;color:#888;font-size:12px;cursor:pointer;}
  .tab.active{background:#A4E5E0;border-color:#76D5CF;color:#085041;font-weight:500;}

  /* 登出 */
  .logout-btn{display:block;text-align:center;padding:12px;color:#aaa;font-size:13px;cursor:pointer;margin-top:1rem;}

  /* 級別顏色 */
  .bg-intern{background:linear-gradient(135deg,#A4E5E0,#76D5CF);}
  .bg-3{background:linear-gradient(135deg,#8DDDD7,#5BBDB7);}
  .bg-3c{background:linear-gradient(135deg,#76D5CF,#4BBDB7);}
  .bg-2{background:linear-gradient(135deg,#E8B4BE,#D4949F);}
  .bg-1{background:linear-gradient(135deg,#D5C6E0,#BBA8CE);}
  .bg-royal{background:linear-gradient(135deg,#C9A84C,#E8D5A3,#C9A84C);}

  .pending-tag{display:inline-block;padding:3px 10px;border-radius:12px;background:#fff3cd;color:#856404;font-size:12px;}
</style>

// 初始化年月選單
function initSelects(){
  const yr = document.getElementById('profitYear');
  const mn = document.getElementById('profitMonth');
  yr.innerHTML = '';
  const now = new Date();
  for(let y=now.getFullYear();y>=now.getFullYear()-1;y--){
    yr.innerHTML += `<option value="${y}">${y}年</option>`;
  }
  mn.innerHTML = '';
  for(let m=1;m<=12;m++){
    const sel = m===now.getMonth()+1?' selected':'';
    mn.innerHTML += `<option value="${m}"${sel}>${m}月</option>`;
  }
}

// 登入/註冊切換
function showRegister(){
  document.getElementById('loginForm').style.display='none';
  document.getElementById('registerForm').style.display='block';
  document.getElementById('loginMsg').textContent='';
}
function showLogin(){
  document.getElementById('registerForm').style.display='none';
  document.getElementById('loginForm').style.display='block';
  document.getElementById('loginMsg').textContent='';
}

// 註冊
async function doRegister(){
  const name = document.getElementById('regName').value.trim();
  const phone = document.getElementById('regPhone').value.trim();
  const pwd = document.getElementById('regPwd').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!name||!phone||!pwd){msg.textContent='請填寫所有欄位';return;}
  const existing = await sb.from('users').select('id').eq('phone',phone).single();
  if(existing.data){msg.textContent='此手機號碼已申請過';return;}
  const {error} = await sb.from('users').insert({name,phone,password:pwd,level:'實習',status:'待審核',init_fans:0});
  if(error){msg.textContent='申請失敗，請再試一次';return;}
  msg.style.color='#1D9E75';
  msg.textContent='申請成功！請等待管理員審核後登入';
  setTimeout(showLogin,2000);
}

// 登入

  const pwd = document.getElementById('loginPwd').value.trim();
  const msg = document.getElementById('loginMsg');
  if(!phone||!pwd){msg.textContent='請填寫手機號碼和密碼';return;}
  const {data,error} = await sb.from('users').select('*').eq('phone',phone).eq('password',pwd).single();
  if(!data){msg.textContent='手機號碼或密碼錯誤';return;}
  if(data.status==='待審核'){msg.textContent='帳號審核中，請等待管理員審核';return;}
  currentUser = data;
  enterApp();
}

// 進入APP
function enterApp(){
  document.getElementById('loginPage').style.display='none';
  document.getElementById('mainPage').style.display='block';
  const header = document.getElementById('appHeader');
  header.className = 'app-header ' + (LEVEL_BG[currentUser.level]||'bg-intern');
  document.getElementById('headerName').textContent = currentUser.name;
  document.getElementById('headerLevel').textContent = currentUser.level;
  document.getElementById('profileName').textContent = currentUser.name;
  document.getElementById('profilePhone').textContent = currentUser.phone;
  document.getElementById('profileLevel').textContent = currentUser.level;
  document.getElementById('profileStatus').textContent = currentUser.status;
  document.getElementById('initFansInput').value = currentUser.init_fans||0;
  initSelects();
  renderSaleItems();
  loadMonthlyData();
}

// 登出
function doLogout(){
  currentUser=null;
  document.getElementById('mainPage').style.display='none';
  document.getElementById('loginPage').style.display='flex';
  document.getElementById('loginPhone').value='';
  document.getElementById('loginPwd').value='';
}

// 頁面切換
function switchPage(page,el){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n=>n.classList.remove('active'));
  document.getElementById('page-'+page).classList.add('active');
  el.classList.add('active');
  if(page==='profit') loadMonthlyData();
}

function switchSubTab(section,tab){
  const inputEl = document.getElementById(section+'-input');
  const chartEl = document.getElementById(section+'-chart');
  const tabs = document.querySelectorAll('#page-'+section+' .tab');
  tabs.forEach((t,i)=>t.classList.toggle('active',i===(tab==='input'?0:1)));
  if(tab==='input'){inputEl.style.display='block';chartEl.style.display='none';}
  else{inputEl.style.display='none';chartEl.style.display='block';renderCharts();}
}

// 品項管理
function renderSaleItems(){
  const level = currentUser?currentUser.level:'實習';
  const container = document.getElementById('salesItems');
  container.innerHTML = saleItems.map((item,i)=>{
    const cost = PRODUCTS[item.productIdx].costs[level]||0;
    const total = cost*item.qty;
    const options = PRODUCTS.map((p,pi)=>`<option value="${pi}"${pi===item.productIdx?' selected':''}>${p.name}</option>`).join('');
    return `<div class="item-row">
      <select onchange="changeProd(${i},this.value)">${options}</select>
      <input type="number" min="1" value="${item.qty}" onchange="changeQty(${i},this.value)" />
      <div class="item-cost">$${cost.toLocaleString()}<br>共$${total.toLocaleString()}</div>
      <button class="remove-btn" onclick="removeItem(${i})">×</button>
    </div>`;
  }).join('');
}
function addSaleItem(){saleItems.push({productIdx:0,qty:1});renderSaleItems();}
function changeProd(i,v){saleItems[i].productIdx=parseInt(v);renderSaleItems();}
function changeQty(i,v){saleItems[i].qty=Math.max(1,parseInt(v)||1);renderSaleItems();}
function removeItem(i){if(saleItems.length>1)saleItems.splice(i,1);renderSaleItems();}

// 儲存月份數據
async function saveMonthData(){
  const level = currentUser.level;
  const year = parseInt(document.getElementById('profitYear').value);
  const month = parseInt(document.getElementById('profitMonth').value);
  const revenue = parseInt(document.getElementById('totalRevenue').value)||0;
  const videos = parseInt(document.getElementById('videoCount').value)||0;
  const fans = parseInt(document.getElementById('fansGain').value)||0;
  const newC = parseInt(document.getElementById('newClients').value)||0;
  const retC = parseInt(document.getElementById('returnClients').value)||0;

  let totalCost = 0;
  saleItems.forEach(item=>{
    totalCost += (PRODUCTS[item.productIdx].costs[level]||0)*item.qty;
  });
  const profit = revenue - totalCost;

  const existing = await sb.from('monthly_data').select('id').eq('user_id',currentUser.id).eq('year',year).eq('month',month).single();
  if(existing.data){
    await sb.from('monthly_data').update({profit,fans_gain:fans,videos,new_clients:newC,return_clients:retC}).eq('id',existing.data.id);
  } else {
    await sb.from('monthly_data').insert({user_id:currentUser.id,year,month,profit,fans_gain:fans,videos,new_clients:newC,return_clients:retC,init_fans:currentUser.init_fans||0});
  }

  document.getElementById('resRevenue').textContent = 'NT$'+revenue.toLocaleString();
  document.getElementById('resCost').textContent = 'NT$'+totalCost.toLocaleString();
  const profitEl = document.getElementById('resProfit');
  profitEl.textContent = 'NT$'+profit.toLocaleString();
  profitEl.className = 'profit-big '+(profit>=0?'profit-pos':'profit-neg');
  document.getElementById('resultCard').style.display='block';
  loadMonthlyData();
  alert(year+'年'+month+'月數據已儲存！');
}

// 儲存起始粉絲
async function saveInitFans(){
  const v = parseInt(document.getElementById('initFansInput').value)||0;
  await sb.from('users').update({init_fans:v}).eq('id',currentUser.id);
  currentUser.init_fans = v;
  alert('起始粉絲已儲存！');
  loadMonthlyData();
}

// 載入月份數據
async function loadMonthlyData(){
  if(!currentUser) return;
  const {data} = await sb.from('monthly_data').select('*').eq('user_id',currentUser.id).order('year').order('month');
  monthlyCache = data||[];
  renderMetrics();
}

function renderMetrics(){
  const total = monthlyCache.reduce((a,m)=>a+m.profit,0);
  const totalFans = monthlyCache.reduce((a,m)=>a+m.fans_gain,0);
  const totalNew = monthlyCache.reduce((a,m)=>a+m.new_clients,0);
  const totalRet = monthlyCache.reduce((a,m)=>a+m.return_clients,0);
  document.getElementById('profitMetrics').innerHTML = `
    <div class="metric"><div class="metric-label">年度淨利</div><div class="metric-value">$${Math.round(total/1000)}K</div></div>
    <div class="metric"><div class="metric-label">總增粉</div><div class="metric-value">+${totalFans.toLocaleString()}</div></div>
    <div class="metric"><div class="metric-label">回購率</div><div class="metric-value">${totalNew+totalRet?Math.round(totalRet/(totalNew+totalRet)*100):0}%</div></div>`;
}

function renderCharts(){
  const labels = MONTHS_LABEL;
  const year = new Date().getFullYear();
  const byMonth = Array(12).fill(null).map((_,i)=>monthlyCache.find(m=>m.year===year&&m.month===i+1)||null);
  const profits = byMonth.map(m=>m?m.profit:null);
  const fans = byMonth.map(m=>m?m.fans_gain:null);
  const videos = byMonth.map(m=>m?m.videos:null);
  const newC = byMonth.map(m=>m?m.new_clients:null);
  const retC = byMonth.map(m=>m?m.return_clients:null);

  let cumFans=[], running=currentUser.init_fans||0;
  byMonth.forEach(m=>{running+=(m?m.fans_gain:0);cumFans.push(m?running:null);});

  const baseOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},y:{ticks:{font:{size:10}}}}};

  if(pChart) pChart.destroy();
  pChart = new Chart(document.getElementById('profitChartCanvas'),{
    type:'line',data:{labels,datasets:[{data:profits,borderColor:'#5BBDB7',backgroundColor:'rgba(91,189,183,0.15)',fill:true,tension:0.3,pointBackgroundColor:'#5BBDB7'}]},
    options:baseOpts
  });

  if(fChart) fChart.destroy();
  fChart = new Chart(document.getElementById('fansChartCanvas'),{
    type:'bar',data:{labels,datasets:[
      {label:'總粉絲',data:cumFans,backgroundColor:'#5BBDB7'},
      {label:'增粉',data:fans,backgroundColor:'#D4537E'},
      {type:'line',label:'影片',data:videos,borderColor:'#7F77DD',backgroundColor:'transparent',pointBackgroundColor:'#7F77DD',tension:0.3,yAxisID:'y2'}
    ]},
    options:{...baseOpts,scales:{x:{ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},y:{ticks:{font:{size:10}}},y2:{position:'right',ticks:{font:{size:10}},grid:{display:false}}}}
  });

  if(cChart) cChart.destroy();
  cChart = new Chart(document.getElementById('clientsChartCanvas'),{
    type:'bar',data:{labels,datasets:[
      {label:'新消費者',data:newC,backgroundColor:'#7F77DD'},
      {label:'回購客',data:retC,backgroundColor:'#5BBDB7'}
    ]},
    options:{...baseOpts,scales:{x:{stacked:true,ticks:{autoSkip:false,maxRotation:0,font:{size:10}}},y:{stacked:true,ticks:{font:{size:10}}}}}
  });
}
</script>
