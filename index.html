<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="HT團隊">
<title>HT 團隊系統</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;min-height:100vh;}
#loginPage{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:2rem;background:url('HT1.jpg') center/cover no-repeat;}
.login-header{text-align:center;margin-bottom:2rem;}
.login-header h1{font-size:28px;font-weight:500;color:white;letter-spacing:3px;text-shadow:0 1px 8px rgba(0,0,0,0.3);}
.login-header p{font-size:14px;color:rgba(255,255,255,0.85);margin-top:6px;}
.login-card{background:rgba(255,255,255,0.92);backdrop-filter:blur(10px);border-radius:16px;padding:2rem;width:100%;max-width:360px;box-shadow:0 4px 30px rgba(0,0,0,0.2);}
.login-card input,.login-card select{width:100%;padding:12px 14px;border:0.5px solid #ddd;border-radius:10px;font-size:15px;margin-bottom:12px;outline:none;background:white;color:#333;appearance:none;}
.login-card input:focus,.login-card select:focus{border-color:#C9A884;}
.login-btn{width:100%;padding:13px;border:none;border-radius:10px;background:linear-gradient(135deg,#C9A884,#A67C5B);color:white;font-size:15px;font-weight:500;cursor:pointer;letter-spacing:1px;}
.login-switch{text-align:center;margin-top:14px;font-size:13px;color:#888;}
.login-switch a{color:#A67C5B;cursor:pointer;}
.msg{font-size:13px;color:#E24B4A;text-align:center;margin-top:8px;min-height:20px;}
#mainPage{display:none;padding-bottom:80px;}
.app-header{padding:1.25rem 1.25rem 1rem;text-align:center;color:white;}
.app-header h1{font-size:20px;font-weight:500;letter-spacing:2px;}
.level-tag{display:inline-block;padding:3px 14px;border-radius:20px;background:rgba(255,255,255,0.25);font-size:12px;margin-top:6px;}
.user-name{font-size:13px;opacity:0.8;margin-top:4px;}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:0.5px solid #eee;display:flex;z-index:100;}
.nav-item{flex:1;padding:10px 4px 8px;text-align:center;cursor:pointer;border:none;background:none;}
.nav-icon{font-size:20px;display:block;margin-bottom:2px;}
.nav-label{font-size:10px;color:#aaa;}
.nav-item.active .nav-label{color:#5BBDB7;font-weight:500;}
.page{display:none;padding:1rem;}
.page.active{display:block;}
.card{background:white;border-radius:14px;padding:1rem 1.25rem;margin-bottom:1rem;box-shadow:0 1px 8px rgba(0,0,0,0.05);}
.card-title{font-size:13px;color:#888;margin-bottom:12px;letter-spacing:0.5px;}
.metrics{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-bottom:1rem;}
.metric{background:#f8f8f8;border-radius:10px;padding:10px;text-align:center;}
.metric-label{font-size:11px;color:#888;margin-bottom:4px;}
.metric-value{font-size:17px;font-weight:500;color:#333;}
.field{margin-bottom:10px;}
.field label{font-size:12px;color:#888;display:block;margin-bottom:4px;}
.field input,.field select{width:100%;padding:10px 12px;border:0.5px solid #ddd;border-radius:10px;font-size:14px;background:#fafafa;outline:none;color:#333;}
.field input:focus,.field select:focus{border-color:#A4E5E0;background:white;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.form-row.three{grid-template-columns:1fr 1fr 1fr;}
.btn{padding:12px;border-radius:10px;border:none;font-size:14px;font-weight:500;cursor:pointer;width:100%;margin-top:4px;}
.btn-primary{background:#A4E5E0;color:#085041;}
.item-row{display:grid;grid-template-columns:1fr 58px 72px 28px;gap:6px;align-items:center;padding:8px 10px;background:#f8f8f8;border-radius:10px;margin-bottom:6px;}
.item-row select{font-size:12px;padding:5px 6px;border-radius:7px;border:0.5px solid #ddd;background:white;color:#333;}
.item-row input{padding:5px 8px;border-radius:7px;border:0.5px solid #ddd;background:white;text-align:center;font-size:13px;color:#333;}
.item-cost{font-size:11px;color:#888;text-align:right;line-height:1.4;}
.remove-btn{background:none;border:none;color:#bbb;font-size:18px;cursor:pointer;padding:0;}
.add-item-btn{width:100%;padding:9px;border:0.5px dashed #ccc;border-radius:10px;background:transparent;color:#aaa;font-size:13px;cursor:pointer;margin-top:4px;}
.result-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:0.5px solid #f0f0f0;}
.result-row:last-child{border-bottom:none;}
.result-label{font-size:14px;color:#888;}
.result-value{font-size:15px;font-weight:500;color:#333;}
.chart-wrap{position:relative;width:100%;height:200px;margin-top:8px;}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:6px;font-size:12px;color:#888;}
.legend span{display:flex;align-items:center;gap:4px;}
.legend-dot{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
.tabs{display:flex;gap:6px;margin-bottom:1rem;}
.tab{padding:7px 14px;border-radius:18px;border:0.5px solid #ddd;background:transparent;color:#888;font-size:12px;cursor:pointer;}
.tab.active{background:#A4E5E0;border-color:#76D5CF;color:#085041;font-weight:500;}
.logout-btn{display:block;text-align:center;padding:12px;color:#aaa;font-size:13px;cursor:pointer;margin-top:1rem;}
.bg-intern{background:linear-gradient(135deg,#A4E5E0,#76D5CF);}
.bg-3{background:linear-gradient(135deg,#8DDDD7,#5BBDB7);}
.bg-3c{background:linear-gradient(135deg,#76D5CF,#4BBDB7);}
.bg-2{background:linear-gradient(135deg,#E8B4BE,#D4949F);}
.bg-1{background:linear-gradient(135deg,#D5C6E0,#BBA8CE);}
.bg-royal{background:linear-gradient(135deg,#C9A84C,#E8D5A3,#C9A84C);}
.today-summary{display:flex;justify-content:space-between;align-items:center;}
.today-sub{display:flex;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:0.5px solid #f0f0f0;}
.rec-item{padding:8px 0;border-bottom:0.5px solid #f5f5f5;}
.rec-item:last-child{border-bottom:none;}
</style>
</head>
<body>

<div id="loginPage">
  <div class="login-header">
    <h1>HT 團隊系統</h1>
    <p>Jerosse x HT 專屬後台</p>
  </div>
  <div style="text-align:center;margin-bottom:1.5rem;opacity:0.55;color:white;font-size:13px;letter-spacing:3px;">— 你有權利改寫人生 —</div>
  <div class="login-card">
    <div id="loginForm">
      <input type="text" id="loginPhone" placeholder="手機號碼" maxlength="10" />
      <input type="password" id="loginPwd" placeholder="密碼" />
      <button class="login-btn" onclick="doLogin()">登入</button>
      <div class="login-switch">還沒有帳號？<a onclick="showRegister()">立即申請</a></div>
    </div>
    <div id="registerForm" style="display:none;">
      <input type="text" id="regUpline" placeholder="上家姓名" />
      <select id="regLevel">
        <option value="">— 選擇申請級別 —</option>
        <option value="實習">實習</option>
        <option value="三級">三級</option>
        <option value="三級輔導">三級輔導</option>
        <option value="二級">二級</option>
        <option value="二級輔導">二級輔導</option>
        <option value="一級">一級</option>
        <option value="一級輔導">一級輔導</option>
        <option value="皇家">皇家</option>
        <option value="皇家輔導">皇家輔導</option>
      </select>
      <input type="text" id="regName" placeholder="姓名" />
      <input type="text" id="regPhone" placeholder="手機號碼" maxlength="10" />
      <input type="password" id="regPwd" placeholder="設定密碼" />
      <button class="login-btn" onclick="doRegister()">送出申請</button>
      <div class="login-switch">已有帳號？<a onclick="showLogin()">返回登入</a></div>
    </div>
    <div class="msg" id="loginMsg"></div>
  </div>
</div>

<div id="mainPage">
  <div class="app-header" id="appHeader">
    <div class="user-name" id="headerName"></div>
    <h1>HT 團隊系統</h1>
    <div class="level-tag" id="headerLevel"></div>
  </div>

  <!-- 淨利系統 -->
  <div class="page active" id="page-profit">
    <div class="tabs">
      <button class="tab active" onclick="switchSubTab('profit','input')">新增今日</button>
      <button class="tab" onclick="switchSubTab('profit','chart')">趨勢圖表</button>
    </div>

    <div id="profit-input">
      <div class="card">
        <div class="today-summary">
          <div>
            <div style="font-size:12px;color:#888;">今日日期</div>
            <div style="font-size:16px;font-weight:500;color:#333;" id="todayDisplay"></div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:12px;color:#888;">本日累積淨利</div>
            <div style="font-size:20px;font-weight:500;" id="todayProfitDisplay">NT$0</div>
          </div>
        </div>
        <div class="today-sub">
          <div>
            <div style="font-size:12px;color:#888;">本月累積淨利</div>
            <div style="font-size:15px;font-weight:500;color:#333;" id="monthProfitDisplay">NT$0</div>
          </div>
          <div style="text-align:right;">
            <div style="font-size:12px;color:#888;">本月筆數</div>
            <div style="font-size:15px;font-weight:500;color:#333;" id="monthCountDisplay">0 筆</div>
          </div>
        </div>
      </div>

      <div class="card">
        <div class="card-title">新增單筆銷售</div>
        <div id="salesItems"></div>
        <button class="add-item-btn" onclick="addSaleItem()">＋ 新增品項</button>
        <div style="margin-top:12px;padding-top:12px;border-top:0.5px solid #f0f0f0;">
          <div class="field"><label>本次收款金額（NT$）</label><input type="number" id="totalRevenue" placeholder="輸入實收金額" /></div>
        </div>
        <button class="btn btn-primary" onclick="saveRecord()">新增這筆</button>
      </div>

      <div class="card">
        <div class="card-title">粉絲 ＆ 影片（每月更新）</div>
        <div class="form-row">
          <div class="field"><label>目前粉絲數</label><input type="number" id="currentFans" placeholder="現在的粉絲
